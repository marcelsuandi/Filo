# =============================================================================
# Filomena — PRODUCTION stack (Ubuntu Server 24.04)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Hardening highlights:
#   - MariaDB has NO published port (reachable only on the internal network)
#   - phpMyAdmin bound to 127.0.0.1 only (reach via SSH tunnel)
#   - no-new-privileges on every service; rotated json-file logging
#   - read-only rootfs for the stateless backend; healthchecks everywhere
#   - Nginx terminates TLS; certbot auto-renews Let's Encrypt certificates
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.4
    container_name: filo_mariadb
    restart: unless-stopped
    <<: *default-security
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks: [filo_net]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: filo_phpmyadmin
    restart: unless-stopped
    <<: *default-security
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PMA_ABSOLUTE_URI:-http://localhost:8080/}
      UPLOAD_LIMIT: 64M
    # Bound to loopback only — open it through an SSH tunnel:
    #   ssh -L 8080:127.0.0.1:8080 user@server  ->  http://localhost:8080
    ports:
      - "127.0.0.1:${PMA_PORT:-8080}:80"
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [filo_net]
    logging: *default-logging

  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: filo-backend:latest
    container_name: filo_backend
    restart: unless-stopped
    <<: *default-security
    init: true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DIALECT: mariadb
      DB_SYNC: "false"
      CORS_ORIGIN: ${CORS_ORIGIN}
      IP_HASH_SALT: ${IP_HASH_SALT}
      DEFAULT_BABY_SLUG: ${DEFAULT_BABY_SLUG:-filomena}
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [filo_net]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: filo-frontend:latest
    container_name: filo_frontend
    restart: unless-stopped
    <<: *default-security
    networks: [filo_net]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m

  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: filo_nginx
    restart: unless-stopped
    <<: *default-security
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
    # Reload every 6h so renewed Let's Encrypt certs are picked up automatically.
    command: sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload 2>/dev/null || true; done & exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks: [filo_net]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: filo_certbot
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal twice a day; nginx reloads via its own cron/restart.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    logging: *default-logging

networks:
  filo_net:
    driver: bridge

volumes:
  mariadb_data:
  certbot_etc:
  certbot_www:
  nginx_logs:
