# Upstreams (Docker service names resolve via the compose network)
upstream filo_frontend {
    server frontend:80;
}

upstream filo_backend {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    # ---- API -> backend ----
    location /api/ {
        proxy_pass http://filo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Everything else -> frontend (Vue SPA) ----
    location / {
        proxy_pass http://filo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
