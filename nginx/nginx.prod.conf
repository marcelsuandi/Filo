user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    server_tokens off;   # do not leak nginx version

    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- Performance ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---- Limits / timeouts (slowloris mitigation) ----
    client_max_body_size 64m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 20s;
    reset_timedout_connection on;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml font/woff2;

    # ---- Rate limiting zones ----
    limit_req_zone  $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Generated from /etc/nginx/templates/*.template (envsubst on ${DOMAIN})
    include /etc/nginx/conf.d/*.conf;
}
